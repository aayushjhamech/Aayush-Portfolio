<div class="section" id="projects">
  <div class="container cc-education">
    <div class="h4 text-center mb-4 title">Projects</div>

    <pagination-controls (pageChange)="pageChanged($event)"></pagination-controls>
    <div class="row">

      <ng-container *ngFor="let project of projects| paginate: config">
        <div class="col-md-4 col-sm-6 animate-box" data-animate-effect="fadeInLeft">
          <div class="blog-entry">
            <div class="card h-90 d-flex flex-column">
              <img class="card-img-top" src={{project.imgUrl}} onerror="this.src = 'assets/images/gif.gif'" alt="{{project.title}}" style="width:100%; height: 225px; object-fit: cover;">
              <div class="card-body d-flex flex-column">
                <h4 class="card-title">{{project.title}}</h4>
                <h5 class="card-text"><b>Technology :</b> {{project.tech}} </h5>
                <h5 class="card-text" *ngIf="project.mediumlink"><a href={{project.mediumlink}} target="_blank" rel="noopener noreferrer">📝 Read Blog on this Project</a></h5>

                <!-- Spacer to push buttons to bottom -->
                <div class="mt-auto"></div>

                <div class="btn-group mt-3" role="group">
                  <a href={{project.livedemo}} *ngIf="project.livedemo" class="btn btn-primary btn-sm mr-2" target="_blank" rel="noopener noreferrer">Live Demo</a>
                  <a href={{project.githurl}} class="btn btn-primary btn-sm" target="_blank" rel="noopener noreferrer">View on GitHub</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </ng-container>
    </div>
<p></p>
    <pagination-controls (pageChange)="pageChanged($event)"></pagination-controls>
  </div>
</div>
